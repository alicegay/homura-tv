<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="subtitles-octopus.js"></script>
  </head>
  <body
    style="
      flex: 1;
      margin: 0;
      height: 100vh;
      background-color: transparent;
      overflow: hidden;
    "
  >
    <canvas
      id="canvas"
      style="flex: 1; width: 100%; height: 100%"
      width="1920"
      height="1080"
    ></canvas>
    <script>
      const consoleLog = (type, log) =>
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ event: 'console', data: { type: type, log: log } }),
        )
      console = {
        log: (log) => consoleLog('log', log),
        debug: (log) => consoleLog('debug', log),
        info: (log) => consoleLog('info', log),
        warn: (log) => consoleLog('warn', log),
        error: (log, log2) => consoleLog('error', log + JSON.stringify(log2)),
      }

      let instance
      let t = 0.0
      let playing = false
      handleEvent = ({ data }) => {
        console.log(data)
        if (data.event === 'files') {
          const options = {
            canvas: document.getElementById('canvas'),
            workerUrl: 'subtitles-octopus-worker.js',
            fallbackFont: 'default.woff2',
            onError: (e) => {
              console.log('ERROR:')
              console.log(e)
            },
            subUrl: data.subtitle,
            fonts: data.attachments,
            debug: false,
          }
          instance = new SubtitlesOctopus(options)
        } else if (data.event === 'play' || data.event === 'pause') {
          playing = data.event === 'play'
          if (data.time) t = data.time
        }
      }
      document.addEventListener('message', handleEvent)

      const setTime = () => {
        if (playing) t += 0.1
        if (instance) {
          instance.setCurrentTime(t)
        }
        // if (playing && instance) console.log('TIME= ' + t)
      }
      setInterval(setTime, 100)
      window.ReactNativeWebView.postMessage(JSON.stringify({ event: 'ready' }))
    </script>
  </body>
</html>
